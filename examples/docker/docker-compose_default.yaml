version: '3'
name: 'teastore'
services:
  registry:
    image: descartesresearch/teastore-registry
    expose:
      - "8080"
    environment:
      HOST_NAME: "registry"
      SERVICE_PORT: "8080"
    restart: unless-stopped
  db:
    image: descartesresearch/teastore-db
    expose:
      - "3306"
    ports:
      - "3306:3306"
    restart: unless-stopped
  persistence:
    image: descartesresearch/teastore-persistence
    expose:
      - "8080"
    environment:
      HOST_NAME: "persistence"
      SERVICE_PORT: "8080"
      REGISTRY_HOST: "registry"
      REGISTRY_PORT: "8080"
      DB_HOST: "db"
      DB_PORT: "3306"
    depends_on:
      - registry
      - db
    restart: unless-stopped
  auth:
    image: descartesresearch/teastore-auth
    expose:
      - "8080"
    environment:
      HOST_NAME: "auth"
      SERVICE_PORT: "8080"
      REGISTRY_HOST: "registry"
      REGISTRY_PORT: "8080"
    depends_on:
      - registry
    restart: unless-stopped
  image:
    image: descartesresearch/teastore-image
    expose:
      - "8080"
    environment:
      HOST_NAME: "image"
      SERVICE_PORT: "8080"
      REGISTRY_HOST: "registry"
      REGISTRY_PORT: "8080"
    depends_on:
      - registry
    restart: unless-stopped
  recommender:
    image: descartesresearch/teastore-recommender
    expose:
      - "8080"
    environment:
      HOST_NAME: "recommender"
      SERVICE_PORT: "8080"
      REGISTRY_HOST: "registry"
      REGISTRY_PORT: "8080"
    depends_on:
      - registry
      - persistence
    restart: unless-stopped
  webui:
    image: descartesresearch/teastore-webui
    expose:
      - "8080"
    environment:
      HOST_NAME: "webui"
      SERVICE_PORT: "8080"
      REGISTRY_HOST: "registry"
      REGISTRY_PORT: "8080"
    ports:
      - "8080:8080"
    depends_on:
      - registry
      - persistence
      - auth
      - image
      - recommender
    restart: unless-stopped